name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  import-service:
    name: import-service (lint, build, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/import-service

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: importer
          POSTGRES_PASSWORD: importer
          POSTGRES_DB: emissions_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U importer -d emissions_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://importer:importer@localhost:5432/emissions_test?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: services/import-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type-check & build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: E2E tests
        run: npm run test:e2e
